<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Telegram</title>

  <style>
    body {
      margin: 0;
      background: #0e1621;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
    }

    .loader {
      border: 6px solid #ccc;
      border-top: 6px solid #2AABEE;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Подключение к группе...</h2>
    <div class="loader"></div>
  </div>

  <audio id="scream" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>

  <script>
    setTimeout(() => {
      document.body.innerHTML = `
        <img src="https://i.imgur.com/Z6XQZ6v.jpg" 
        style="width:100vw;height:100vh;object-fit:cover;">
      `;
      document.getElementById("scream").play();
    }, 4000);
  </script>
</body>
</html>
