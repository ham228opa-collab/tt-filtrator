<audio id="scream1" src="https://www.myinstants.com/media/sounds/movie_1.mp3"></audio>
<audio id="scream2" src="https://www.myinstants.com/media/sounds/wilhelm-scream.mp3"></audio>

<script>
setTimeout(() => {
  // первый резкий момент
  document.body.style.background = "white";

  setTimeout(() => {
    document.body.innerHTML = `
      <img src="https://i.imgur.com/Z6XQZ6v.jpg"
      style="width:100vw;height:100vh;object-fit:cover;">
    `;

    let a1 = document.getElementById("scream1");
    a1.volume = 0.6;
    a1.play();

    // второй скример через секунду (добивает)
    setTimeout(() => {
      let a2 = document.getElementById("scream2");
      a2.volume = 0.7;
      a2.play();
    }, 1000);

  }, 100);

}, 6000);
</script>
